services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports:
      - "8000:8000"
    environment:
      - HF_HOME=/app/hf_cache
      - TRANSFORMERS_OFFLINE=0
      - HF_HUB_DISABLE_TELEMETRY=1
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - ${PWD}/runtime/db:/app/db
      - ${PWD}/runtime/data:/app/data
      - ${PWD}/runtime/hf_cache:/app/hf_cache

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
